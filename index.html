<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Spraying Assistant</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'ag-dark':   '#0f2d1e',
            'ag-deep':   '#1a4731',
            'ag-mid':    '#237a52',
            'ag-panel':  '#f0fdf9',
            'ag-teal':   '#059669',
            'ag-bright': '#059669',
            'ag-lite':   '#10b981',
            'ag-cream':  '#f0fdf9',
            'ag-gold':   '#c9a84c',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    * { box-sizing: border-box; }
    ::-webkit-scrollbar { height: 4px; width: 4px; background: transparent; }
    ::-webkit-scrollbar-thumb { background: #059669; border-radius: 4px; }
    /* Clean solid card utilities — no glass/blur */
    .frost       { }
    .frost-light { }
    .frost-deep  { }
    input::placeholder { color: rgba(15,45,30,0.84); }
    input:focus { outline: none; }
    .collapsible-toggle { cursor:pointer; user-select:none; list-style:none; }
    .collapsible-toggle::-webkit-details-marker { display:none; }
    details > summary { cursor:pointer; list-style:none; }
    details > summary::-webkit-details-marker { display:none; }
    @media (max-width: 640px) {
      .metric-grid { grid-template-columns: repeat(3,1fr) !important; }
      .nozzle-cards { flex-direction: column !important; }
      .rules-legend { grid-template-columns: 1fr !important; }
      .param-grid { grid-template-columns: repeat(2,1fr) !important; }
    }
    @media print {
      body { background: #fff !important; }
      #root > div > div:first-child { display:none; }
      .no-print { display:none !important; }
      .print-record { display:block !important; color:#000; font-family:Arial,sans-serif; }
      .print-record h1 { font-size:20px; border-bottom:2px solid #000; padding-bottom:8px; }
      .print-record .pr-row { display:flex; gap:16px; margin:6px 0; font-size:13px; }
      .print-record .pr-label { font-weight:700; min-width:140px; }
      .print-record .pr-section { margin:18px 0 8px; font-size:15px; font-weight:700; border-bottom:1px solid #ccc; padding-bottom:4px; }
      .print-record .pr-table { width:100%; border-collapse:collapse; font-size:12px; margin-top:8px; }
      .print-record .pr-table th { background:#f0f0f0; border:1px solid #ccc; padding:6px 8px; text-align:left; }
      .print-record .pr-table td { border:1px solid #ccc; padding:5px 8px; }
      .print-record .sig-line { margin-top:32px; border-top:1px solid #000; width:260px; display:inline-block; padding-top:4px; font-size:11px; }
    }
  </style>
</head>
<body style="background:#f8fffe; margin:0; min-height:100vh">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ─── Helpers ─────────────────────────────────────────────── */
    function degToCompass(deg) {
      const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
      return dirs[Math.round(deg / 22.5) % 16];
    }

    function fmtHour(iso) {
      const d = new Date(iso);
      return d.toLocaleTimeString([], { hour: 'numeric', hour12: true });
    }

    function fmtDateTime() {
      return new Date().toLocaleString([], {
        weekday: 'short', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    /* status = 'green' | 'yellow' | 'red' */
    function sprayStatus(wind, rain2h, rain4h) {
      if (wind > 15 || rain2h >= 40)           return 'red';
      if (wind >= 10 || rain4h >= 40)           return 'yellow';
      if (wind >= 3)                             return 'green';
      return 'yellow'; // < 3 mph — inversion / no-drift-dispersal risk
    }

    const STATUS_CFG = {
      green:  { label: 'GO',      sub: 'Safe to Spray',    ring: '#22c55e', bg: '#166534', text: '#bbf7d0', dot: '#4ade80' },
      yellow: { label: 'CAUTION', sub: 'Spray with Care',  ring: '#f59e0b', bg: '#78350f', text: '#fef3c7', dot: '#fbbf24' },
      red:    { label: 'NO-GO',   sub: 'Do Not Spray',     ring: '#ef4444', bg: '#7f1d1d', text: '#fee2e2', dot: '#f87171' },
    };

    const ADVICE = {
      green: {
        headline: 'Conditions are favorable — proceed with application.',
        points: [
          'Wind is within the optimal 3–10 mph range.',
          'No significant rain forecast for the next 4 hours.',
          'Spray drift risk is low; standard nozzle selection applies.',
          'Monitor conditions and stop if wind picks up unexpectedly.',
        ]
      },
      yellow: {
        headline: 'Marginal conditions — spray with caution.',
        points: [
          'Wind speed is near the upper threshold; drift is possible.',
          'Use drift-reduction nozzles and keep boom close to canopy.',
          'Reduce application speed and consider lower boom pressure.',
          'Consider waiting for a better window in the next few hours.',
        ]
      },
      red: {
        headline: 'Unsafe conditions — do not spray now.',
        points: [
          'Wind speed exceeds safe limits — significant drift hazard.',
          'Rain risk may wash applied product off target surfaces.',
          'Off-target movement can harm neighbouring crops and waterways.',
          'Check the Spray Window forecast below for the next opportunity.',
        ]
      }
    };

    /* ─── Sub-components ──────────────────────────────────────── */
    function WindArrow({ deg, size = 18 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 20 20" style={{ display:'inline-block', verticalAlign:'middle' }}>
          <g transform={`rotate(${deg}, 10, 10)`}>
            <polygon points="10,1 14,17 10,13 6,17" fill="currentColor" />
          </g>
        </svg>
      );
    }

    function StatusOrb({ status }) {
      const c = STATUS_CFG[status];
      return (
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:8 }}>
          <div style={{
            width: 140, height: 140, borderRadius: '50%',
            background: c.bg,
            border: `4px solid ${c.ring}`,
            boxShadow: `0 0 40px ${c.ring}55, 0 0 80px ${c.ring}22`,
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            gap: 2
          }}>
            <span style={{ fontSize: 38, color: c.dot }}>
              {status === 'green' ? '✓' : status === 'yellow' ? '⚠' : '✕'}
            </span>
            <span style={{ fontSize: 16, fontWeight: 900, color: '#fff', letterSpacing: 2 }}>
              {c.label}
            </span>
          </div>
          <span style={{ color: c.dot, fontWeight: 700, fontSize: 14 }}>{c.sub}</span>
        </div>
      );
    }

    function MetricCard({ icon, label, value, unit }) {
      return (
        <div className="frost-light rounded-xl p-4 flex flex-col items-center gap-1"
             style={{ background:'#ffffff', border:'1px solid rgba(5,150,105,0.2)', boxShadow:'0 1px 6px rgba(0,0,0,0.06)' }}>

          <span style={{ color:'rgba(15,45,30,0.84)', fontSize: 10, fontWeight: 700, textTransform:'uppercase', letterSpacing: 2 }}>{label}</span>
          <div className="flex items-baseline gap-1">
            <span style={{ color:'#0f2d1e', fontWeight: 800, fontSize: 26 }}>{value}</span>
            <span style={{ color:'rgba(15,45,30,0.80)', fontSize: 13 }}>{unit}</span>
          </div>
        </div>
      );
    }

    function HourCell({ time, wind, dir, rain, isNow }) {
      const st = sprayStatus(wind, rain, rain);
      const palette = {
        green:  { bg: '#f0fdf4', border: 'rgba(34,197,94,0.5)',  text: '#16a34a' },
        yellow: { bg: '#fffbeb', border: 'rgba(251,191,36,0.5)', text: '#b45309' },
        red:    { bg: '#fff1f2', border: 'rgba(239,68,68,0.5)',  text: '#dc2626' },
      };
      const p = palette[st];
      return (
        <div className="frost-light" style={{
          display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
          padding: '8px 10px', borderRadius: 10, minWidth: 62,
          background: p.bg, border: `1.5px solid ${p.border}`,
          boxShadow: isNow ? '0 0 0 2px #059669' : '0 1px 4px rgba(0,0,0,0.06)',
          outline: 'none'

          <span style={{ color: '#0f2d1e', fontSize: 11, fontWeight: 700 }}>
            {isNow ? 'NOW' : fmtHour(time)}

          <span style={{ color: '#0f2d1e', fontSize: 15, fontWeight: 800 }}>
            {Math.round(wind)}

          <span style={{ color: 'rgba(15,45,30,0.88)', fontSize: 10 }}>mph</span>
          <span style={{ color: p.text }}><WindArrow deg={dir} size={16} /></span>
          <span style={{ color: 'rgba(15,45,30,0.85)', fontSize: 10 }}>{degToCompass(dir)}</span>
          <span style={{ color: 'rgba(15,45,30,0.88)', fontSize: 10 }}>🌧 {rain}%</span>
        </div>
      );
    }

    /* ─── Label compliance check ─────────────────────────────── */
    function checkLabelCompliance(herb, windSpeed, tempF, rain2h) {
      const checks = [];
      /* Wind max */
      if (herb.windMax != null) {
        const pass = windSpeed <= herb.windMax;
        checks.push({ label:'Wind speed', value:`${Math.round(windSpeed)} mph`, limit:`Label max: ≤${herb.windMax} mph`, pass });
      }
      /* Wind min (dicamba inversion requirement) */
      if (herb.windMin != null) {
        const pass = windSpeed >= herb.windMin;
        checks.push({ label:'Min. wind (inversion)', value:`${Math.round(windSpeed)} mph`, limit:`Label min: ≥${herb.windMin} mph`, pass });
      }
      /* Temp min */
      if (herb.tempMin != null) {
        const pass = tempF >= herb.tempMin;
        checks.push({ label:'Min. temperature', value:`${Math.round(tempF)}°F`, limit:`Label min: ≥${herb.tempMin}°F`, pass });
      }
      /* Temp max */
      if (herb.tempMax != null) {
        const pass = tempF <= herb.tempMax;
        checks.push({ label:'Max. temperature', value:`${Math.round(tempF)}°F`, limit:`Label max: ≤${herb.tempMax}°F`, pass });
      }
      /* Rainfast window */
      const rainfastPass = rain2h < 40;
      checks.push({ label:'Rainfast window', value: rainfastPass ? 'No rain in 2 hrs' : 'Rain likely < 2 hrs', limit:`Requires ${herb.rainfast} before rain`, pass: rainfastPass });
      return checks;
    }

    /* ─── Herbicide Card ─────────────────────────────────────── */
    const GROUP_COLORS = {
      '1':'#f97316','2':'#a78bfa','3':'#fb923c','4':'#f472b6',
      '5':'#60a5fa','6':'#34d399','9':'#4ade80','10':'#facc15',
      '14':'#f87171','15':'#38bdf8','22':'#ef4444','27':'#c084fc',
    };
    function groupColor(g) {
      const first = (g||'').split(/[+\s]/)[0].trim();
      return GROUP_COLORS[first] || '#94a3b8';
    }

      const [expanded, setExpanded] = React.useState(false);
      const gc = groupColor(herb.group);
      const compliance = weather ? checkLabelCompliance(herb, curWind, curTemp, rain2h) : null;
      const allPass = compliance ? compliance.every(c => c.pass) : null;
      const anyFail = compliance ? compliance.some(c => !c.pass) : null;

      return (
        <div className="frost" style={{ background:'#f0fdf9', border:'1px solid rgba(5,150,105,0.14)', borderRadius:16, overflow:'hidden', boxShadow:'0 4px 24px rgba(0,0,0,0.06)' }}>

                  Group {herb.group}
                </span>
                <span style={{ background:'rgba(5,150,105,0.10)', border:'1px solid rgba(5,150,105,0.16)', color:'rgba(15,45,30,0.7)', fontSize:10, fontWeight:700, letterSpacing:1, padding:'2px 7px', borderRadius:5, textTransform:'uppercase' }}>

                </span>

                    <span style={{ color: c.pass ? '#4ade80' : '#f87171', fontWeight:800, fontSize:13 }}>{c.pass ? '✓' : '✕'}</span>
                    <div>
                      <div style={{ color:'rgba(15,45,30,0.88)', fontSize:9, fontWeight:700, textTransform:'uppercase', letterSpacing:1 }}>{c.label}</div>

                      <div style={{ color:'rgba(15,45,30,0.68)', fontSize:10 }}>{c.limit}</div>
                    </div>

    /* ─── Herbicide Selector ─────────────────────────────────── */
    function HerbicideSelector({ selected, onAdd, onRemove, weather, curTemp, curWind, rain2h, selectedCrop, setSelectedCrop }) {
      const [q, setQ]             = React.useState('');
      const [sugs, setSugs]       = React.useState([]);
      const [open, setOpen]       = React.useState(false);
      const [activeI, setActiveI] = React.useState(-1);
      const wrapRef               = React.useRef(null);

      React.useEffect(() => {
        const term = q.trim().toLowerCase();
        if (term.length < 1) { setSugs([]); setOpen(false); return; }
        const cropObj = selectedCrop ? CROPS.find(c => c.id === selectedCrop) : null;
        const cropMatch = cropObj && cropObj.match;
        const hits = HERBICIDE_DB.filter(h =>
          !selected.find(s => s.id === h.id) &&
          (!cropMatch || h.crops.toLowerCase().includes(cropMatch)) &&
          (h.name.toLowerCase().includes(term) ||
           h.ai.toLowerCase().includes(term)  ||
           h.moa.toLowerCase().includes(term) ||
           h.targetWeeds.toLowerCase().includes(term))
        ).slice(0, 8);
        setSugs(hits);
        setOpen(hits.length > 0);
        setActiveI(-1);
      }, [q, selected]);

      React.useEffect(() => {
        function out(e) { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); }
        document.addEventListener('mousedown', out);
        return () => document.removeEventListener('mousedown', out);
      }, []);

      const pick = (h) => { onAdd(h); setQ(''); setSugs([]); setOpen(false); };

      const onKey = (e) => {
        if (!open || !sugs.length) return;
        if (e.key === 'ArrowDown')  { e.preventDefault(); setActiveI(i => Math.min(i+1, sugs.length-1)); }
        if (e.key === 'ArrowUp')    { e.preventDefault(); setActiveI(i => Math.max(i-1, 0)); }
        if (e.key === 'Enter')      { e.preventDefault(); if (activeI >= 0) pick(sugs[activeI]); }
        if (e.key === 'Escape')     { setOpen(false); }
      };

      return (
        <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
          {/* Section header */}
          <p style={{ margin:0, color:'rgba(15,45,30,0.82)', fontSize:11, fontWeight:700, letterSpacing:2, textTransform:'uppercase' }}>
            Herbicide Selection
          </p>

          {/* Search input */}
          <div ref={wrapRef} style={{ position:'relative' }}>
            <input
              type="text" value={q} autoComplete="off"
              onChange={e => { setQ(e.target.value); setOpen(true); }}
              onKeyDown={onKey}
              onFocus={() => { if (sugs.length > 0) setOpen(true); }}
              placeholder="Search by product name, active ingredient, or target weed…"
              style={{ width:'100%', background:'#ffffff', border:'1px solid rgba(5,150,105,0.25)', borderRadius:12, padding:'10px 16px', color:'#0f2d1e', fontSize:14, outline:'none', fontFamily:'inherit', boxSizing:'border-box' }}
            />
            {/* Dropdown */}
            {open && sugs.length > 0 && (
              <div style={{ position:'absolute', top:'calc(100% + 6px)', left:0, right:0, background:'#ffffff', border:'1px solid rgba(5,150,105,0.2)', borderRadius:12, overflow:'hidden', boxShadow:'0 4px 20px rgba(0,0,0,0.10)', zIndex:200 }}>
                {sugs.map((h, i) => {
                  const gc = groupColor(h.group);
                  return (
                    <div key={h.id} onMouseDown={() => pick(h)} onMouseEnter={() => setActiveI(i)}
                      style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 16px', cursor:'pointer', background: i===activeI ? 'rgba(5,150,105,0.08)' : 'transparent', borderBottom: i < sugs.length-1 ? '1px solid rgba(5,150,105,0.06)' : 'none' }}>
                      <span style={{ background:`${gc}22`, border:`1px solid ${gc}44`, color:gc, fontSize:9, fontWeight:800, padding:'2px 6px', borderRadius:4, letterSpacing:1, whiteSpace:'nowrap' }}>G{h.group}</span>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ color:'#0f2d1e', fontSize:13, fontWeight:700, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{h.name}</div>
                        <div style={{ color:'rgba(15,45,30,0.82)', fontSize:11, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{h.ai}</div>
                      </div>
                      <span style={{ color:'rgba(15,45,30,0.72)', fontSize:10, whiteSpace:'nowrap', flexShrink:0 }}>{h.type}</span>
                    </div>
                  );
                })}
              </div>
            )}
            {open && q.trim().length >= 1 && sugs.length === 0 && (
              <div style={{ position:'absolute', top:'calc(100% + 6px)', left:0, right:0, background:'#ffffff', border:'1px solid rgba(5,150,105,0.2)', borderRadius:12, padding:'12px 16px', zIndex:200, boxShadow:'0 4px 20px rgba(0,0,0,0.10)' }}>
                <span style={{ color:'rgba(15,45,30,0.82)', fontSize:13 }}>No products found for "<strong style={{color:'rgba(15,45,30,0.88)'}}>{q}</strong>"</span>
              </div>
            )}
          </div>

          {/* No selections hint */}
          {selected.length === 0 && (
            <p style={{ margin:0, color:'rgba(15,45,30,0.72)', fontSize:13, textAlign:'center', padding:'8px 0' }}>
              Search above to add herbicides — label conditions will be checked against current weather.
            </p>
          )}

          {/* Selected herbicide cards */}
          {selected.length > 0 && (
            <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
              {selected.map(h => (
                <HerbicideCard key={h.id} herb={h} onRemove={onRemove} weather={weather} curTemp={curTemp} curWind={curWind} rain2h={rain2h} />
              ))}
            </div>
          )}

          {/* Disclaimer */}
          <p style={{ margin:0, color:'rgba(15,45,30,0.72)', fontSize:11, lineHeight:1.5, textAlign:'center' }}>
            Product data sourced from manufacturer labels and the{' '}
            <a href="https://www.greenbook.net" target="_blank" rel="noopener noreferrer" style={{ color:'rgba(15,45,30,0.68)', textDecoration:'none' }}>Greenbook.net</a>{' '}
            database. Always read and follow the current pesticide label — it is the law.
          </p>
        </div>
      );
    }

    function SprayRecommendations({ windSpeed, status, selectedHerbs = [] }) {
      /* ── Tank-mix volatility analysis ── */
      const dicambaHerbs = selectedHerbs.filter(h =>
        h.moa && h.moa.toLowerCase().includes('dicamba')
      );
      const esterAuxinHerbs = selectedHerbs.filter(h =>
        h.group && h.group.includes('4') &&
        !h.moa.toLowerCase().includes('dicamba') &&
        (h.ai.toLowerCase().includes('ester') ||
          (h.formulation && h.formulation.toLowerCase() === 'ec' && h.moa.toLowerCase().includes('2,4-d')))
      );
      const isDicamba  = dicambaHerbs.length > 0;
      const is24DEster = esterAuxinHerbs.length > 0;
      const isVolatile = isDicamba || is24DEster;

      /* ── Select nozzle tier: volatile Group 4 products get their own label-specific tiers ── */
      const baseTier = windSpeed < 7 ? 'low' : windSpeed < 10 ? 'moderate' : 'high';
      const effectiveTier = isDicamba ? 'dicamba' : is24DEster ? 'ester' : baseTier;
      const wasEscalated  = effectiveTier !== baseTier;
      const rec = NOZZLE_RECS[effectiveTier];

      /* ── Dicamba-specific wind window compliance flags ── */
      const dicambaWindTooLow  = isDicamba && windSpeed < 3;
      const dicambaWindTooHigh = isDicamba && windSpeed > 10;
      const dicambaOutOfWindow = dicambaWindTooLow || dicambaWindTooHigh;

      /* Tips: Group 4 tiers have all requirements built in; combine nothing extra */
      const combinedTips = rec.tips;

      /* GPA bar — visual fill */
      const gpaFill = Math.min(((rec.gpa.ideal.split('–')[0] - 5) / 20) * 100, 100);

      return (
        <div style={{ display:'flex', flexDirection:'column', gap: 16 }}>

          {/* Section header */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap: 8 }}>
            <p style={{ margin:0, color:'rgba(15,45,30,0.82)', fontSize: 11, fontWeight: 700, letterSpacing: 2, textTransform:'uppercase' }}>
              Nozzle & Application Recommendations
            </p>
            <div style={{ display:'flex', gap: 8, flexWrap:'wrap', alignItems:'center' }}>
              {isVolatile && (
                <span style={{
                  background: isDicamba ? 'rgba(239,68,68,0.15)' : 'rgba(251,146,60,0.12)',
                  border: `1px solid ${isDicamba ? 'rgba(239,68,68,0.5)' : 'rgba(251,146,60,0.45)'}`,
                  color: isDicamba ? '#f87171' : '#fb923c',
                  fontSize: 10, fontWeight: 800,
                  padding: '4px 10px', borderRadius: 20, letterSpacing: 0.5, textTransform:'uppercase'
                }}>
                  {isDicamba ? 'Dicamba Label Mode' : '2,4-D Ester Mode'}
                </span>
              )}
              <span style={{
                background: rec.tierBg, border: `1px solid ${rec.tierBorder}`,
                color: rec.tierColor, fontSize: 11, fontWeight: 700,
                padding: '4px 12px', borderRadius: 20, letterSpacing: 0.5
              }}>
                {isVolatile ? rec.windLabel : `Wind ${rec.windLabel} · ${rec.tier}`}
              </span>
            </div>
          </div>

          {/* ── Dicamba wind window OUT-OF-RANGE banner ── */}
          {dicambaOutOfWindow && (
            <div style={{
              background:'rgba(239,68,68,0.12)', border:'1px solid rgba(239,68,68,0.55)',
              borderRadius: 14, padding: '14px 18px', display:'flex', gap: 12, alignItems:'flex-start'
            }}>
              <span style={{ fontSize: 22, flexShrink: 0 }}>🚫</span>
              <div>
                <p style={{ margin:'0 0 4px', color:'#f87171', fontSize: 14, fontWeight: 800 }}>
                  {dicambaWindTooLow
                    ? `Wind ${windSpeed.toFixed(1)} mph — TOO CALM for dicamba application`
                    : `Wind ${windSpeed.toFixed(1)} mph — EXCEEDS dicamba label limit (10 mph max)`}
                </p>
                <p style={{ margin:0, color:'rgba(15,45,30,0.80)', fontSize: 12, lineHeight: 1.5 }}>
                  {dicambaWindTooLow
                    ? 'Calm or near-calm conditions indicate a potential temperature inversion. Dicamba vapor can concentrate near the soil surface and travel miles off-target. Do NOT apply until wind reaches 3 mph with a consistent direction.'
                    : 'Current wind exceeds the dicamba label maximum of 10 mph. Application is not permitted. Wait for wind to decrease to the 3–10 mph window before proceeding.'}
                </p>
              </div>
            </div>
          )}

          {/* ── Tank-mix volatility info banner ── */}
          {isVolatile && (
            <div style={{
              background: isDicamba ? 'rgba(239,68,68,0.07)' : 'rgba(251,146,60,0.07)',
              border: `1px solid ${isDicamba ? 'rgba(239,68,68,0.3)' : 'rgba(251,146,60,0.3)'}`,
              borderRadius: 14, padding: '14px 18px',
              display:'flex', flexDirection:'column', gap: 10
            }}>
              <div style={{ display:'flex', alignItems:'flex-start', gap: 12 }}>
                <span style={{ fontSize: 18, flexShrink: 0, marginTop: 1 }}>{isDicamba ? '⚠️' : '🌡️'}</span>
                <div>
                  <p style={{ margin:'0 0 4px', color: isDicamba ? '#f87171' : '#fb923c', fontSize: 13, fontWeight: 800, lineHeight: 1.3 }}>

                  <p style={{ margin:0, color:'rgba(15,45,30,0.84)', fontSize: 11, lineHeight: 1.5 }}>
                    {isDicamba
                      ? 'Current dicamba labels (XtendiMax, Engenia, FeXapan) require nozzles producing a minimum of Extremely Coarse (XC) droplets from the approved nozzle list. Standard flat-fan or AIXR nozzles are not label-compliant for these products.'
                      : 'Ester formulations of 2,4-D volatilize readily in warm conditions. Air-induction nozzles (AIXR minimum, TTI preferred ≥ 75°F) are required to minimize the fine droplet fraction available for vapor-phase off-target movement.'}

                    color: isDicamba ? '#fca5a5' : '#fdba74',
                    fontSize: 11, fontWeight: 700, padding: '3px 10px', borderRadius: 12
                  }}>{h.name}</span>
                ))}
              </div>
            </div>
          )}

          {/* ASABE droplet scale legend */}
          <div style={{ background:'#ffffff', borderRadius:14, padding:'16px 18px', border:'1px solid rgba(5,150,105,0.15)', boxShadow:'0 1px 4px rgba(0,0,0,0.05)' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
              <p style={{ margin:0, color:'rgba(15,45,30,0.84)', fontSize:11, fontWeight:700, letterSpacing:1.5, textTransform:'uppercase' }}>
                ASABE Droplet Classification Scale
              </p>
              <span style={{ fontSize:11, color:'rgba(15,45,30,0.62)', letterSpacing:0.3 }}>← Finer &nbsp;&nbsp; Coarser →</span>
            </div>

            {/* Spectrum bar */}
            <div style={{ display:'flex', gap:4 }}>
              {DROPLET_SCALE.map(d => {
                const active =
                  (effectiveTier === 'low'     && d.code === 'M') ||
                  (effectiveTier === 'moderate' && (d.code === 'C' || d.code === 'VC')) ||
                  (effectiveTier === 'high'     && (d.code === 'VC' || d.code === 'XC' || d.code === 'UC')) ||
                  (effectiveTier === 'dicamba'  && (d.code === 'XC' || d.code === 'UC')) ||
                  (effectiveTier === 'ester'    && (d.code === 'C'  || d.code === 'VC' || d.code === 'XC'));
                return (
                  <div key={d.code} style={{ flex:1, textAlign:'center' }}>
                    {/* Color block */}
                    <div style={{
                      background: active ? d.color : `${d.color}28`,
                      border: `2px solid ${active ? d.color : `${d.color}50`}`,
                      borderRadius: 8,
                      padding: '10px 4px',
                      boxShadow: active ? `0 2px 10px ${d.color}55` : 'none',
                      transition: 'all 0.2s',
                      marginBottom: 6
                    }}>
                      <div style={{ color: active ? '#ffffff' : d.color, fontWeight:800, fontSize:13, lineHeight:1 }}>{d.code}</div>
                      {active && <div style={{ color:'#ffffff', fontSize:9, marginTop:4, opacity:0.9 }}>▼ active</div>}
                    </div>

                    <div style={{ color: active ? d.color : 'rgba(15,45,30,0.65)', fontSize:9, fontWeight: active ? 700 : 500, lineHeight:1.3 }}>
                      {d.label}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Nozzle cards */}
          <div style={{ display:'flex', gap: 14, flexWrap:'wrap' }}>
            {rec.nozzles.map((n, i) => <NozzleCard key={i} nozzle={n} />)}
          </div>

          {/* Application parameters */}
          <div className="frost" style={{ background:'#f0fdf9', borderRadius: 14, padding: 20, border:'1px solid rgba(5,150,105,0.13)', boxShadow:'0 4px 24px rgba(0,0,0,0.05)' }}>
            <p style={{ margin:'0 0 14px', color:'rgba(15,45,30,0.82)', fontSize: 11, fontWeight: 700, letterSpacing: 2, textTransform:'uppercase' }}>
              Application Parameters
            </p>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(140px,1fr))', gap: 12 }}>
              {[
                { icon:'🪣', label:'Carrier Volume', value: rec.gpa.ideal + ' GPA', sub: `${rec.gpa.min}–${rec.gpa.max} GPA range` },
                { icon:'📏', label:'Boom Height',    value: rec.boom,              sub: isDicamba ? 'above weed canopy (label)' : 'above target canopy' },
                { icon:'🚜', label:'Ground Speed',   value: rec.speed,             sub: 'recommended max' },
                { icon:'⚙️', label:'Nozzle Pressure', value: rec.pressure,        sub: 'lower = coarser droplet' },
              ].map(p => (
                <div key={p.label} className="frost-light" style={{ background:'#f0fdf9', borderRadius: 10, padding: '12px 14px', border:'1px solid rgba(5,150,105,0.12)' }}>
