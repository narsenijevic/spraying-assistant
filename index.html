    /* ─── Forecast Chart (SVG sparkline) ─────────────────────── */
    function ForecastChart({ hourly }) {
      if (!hourly || hourly.length === 0) return null;
      const W = 860, H = 160, padL = 42, padR = 42, padT = 16, padB = 28;
      const plotW = W - padL - padR;
      const plotH = H - padT - padB;
      const pts = hourly.slice(0, 24);
      const maxWind = Math.max(20, ...pts.map(h => h.wind||0));
      const minTemp = Math.min(...pts.map(h => h.temp||0));
      const maxTemp = Math.max(...pts.map(h => h.temp||0));
      const tempRange = Math.max(1, maxTemp - minTemp);

      const xOf = (i) => padL + (i / (pts.length - 1)) * plotW;
      const yWindOf = (v) => padT + plotH - ((v / maxWind) * plotH);
      const yTempOf = (v) => padT + plotH - (((v - minTemp) / tempRange) * plotH * 0.7 + plotH * 0.15);

      /* Spray window shading */
      const bands = [];
      let start = null;
      pts.forEach((h, i) => {
        const ok = h.wind <= 15 && h.rain < 50 && (h.temp||50) >= 40;
        if (ok && start === null) start = i;
        if (!ok && start !== null) { bands.push([start, i-1]); start = null; }
      });
      if (start !== null) bands.push([start, pts.length-1]);

      /* Wind polyline — color per segment */
      const windSegs = pts.slice(0,-1).map((h,i) => {
        const x1=xOf(i), y1=yWindOf(h.wind||0), x2=xOf(i+1), y2=yWindOf(pts[i+1].wind||0);
        const w = (h.wind||0);
        const col = w<=7?'#16a34a':w<=10?'#d97706':'#dc2626';
        return { x1,y1,x2,y2,col };
      });

      /* Temp area path */
      const tempPts = pts.map((h,i) => `${xOf(i)},${yTempOf(h.temp||0)}`).join(' ');
      const tempArea = `M${xOf(0)},${yTempOf(pts[0].temp||0)} ` +
        pts.map((h,i) => `L${xOf(i)},${yTempOf(h.temp||0)}`).join(' ') +
        ` L${xOf(pts.length-1)},${padT+plotH} L${xOf(0)},${padT+plotH} Z`;

      /* Y axis ticks — wind */
      const windTicks = [0,5,10,15,20].filter(v=>v<=maxWind+2);

      /* X axis — every 4 hours */
      const xTicks = pts.filter((_,i)=>i%4===0);

      return (
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',display:'block',overflow:'visible'}}>
          {/* Spray window bands */}
          {bands.map(([a,b],k) => (
            <rect key={k}
              x={xOf(a)} y={padT} width={xOf(b)-xOf(a)} height={plotH}
              fill="rgba(34,197,94,0.08)" />
          ))}
          {/* Wind threshold lines */}
          {[7,10,15].map(v => v<=maxWind+2 && (
            <line key={v} x1={padL} x2={padL+plotW} y1={yWindOf(v)} y2={yWindOf(v)}
              stroke={v<=7?'rgba(74,222,128,0.2)':v<=10?'rgba(251,191,36,0.2)':'rgba(248,113,113,0.2)'}
              strokeDasharray="3 3" />
          ))}
          {/* Temp area */}
          <path d={tempArea} fill="rgba(96,165,250,0.08)" />
          {/* Temp line */}
          <polyline points={tempPts} fill="none" stroke="rgba(37,99,235,0.45)" strokeWidth="1.5" strokeDasharray="4 3" />
          {/* Wind line segments */}
          {windSegs.map((s,i) => (
            <line key={i} x1={s.x1} y1={s.y1} x2={s.x2} y2={s.y2} stroke={s.col} strokeWidth="2.5" strokeLinecap="round" />
          ))}
          {/* Wind dots */}
          {pts.map((h,i) => {
            const w=h.wind||0;
            const col=w<=7?'#16a34a':w<=10?'#d97706':'#dc2626';
            return <circle key={i} cx={xOf(i)} cy={yWindOf(w)} r="3" fill={col} />;
          })}
          {/* Y axis — wind labels */}
          {windTicks.map(v => (
            <text key={v} x={padL-6} y={yWindOf(v)+4} textAnchor="end" fontSize="9" fill="rgba(15,45,30,0.68)">{v}</text>
          ))}
          <text x={padL-10} y={padT+plotH/2} textAnchor="middle" fontSize="9" fill="rgba(15,45,30,0.72)" transform={`rotate(-90,${padL-10},${padT+plotH/2})`}>mph</text>
          {/* Temp labels right axis */}
          <text x={padL+plotW+6} y={yTempOf(maxTemp)+4} textAnchor="start" fontSize="9" fill="rgba(37,99,235,0.5)">{Math.round(maxTemp)}°</text>
          <text x={padL+plotW+6} y={yTempOf(minTemp)+4} textAnchor="start" fontSize="9" fill="rgba(37,99,235,0.5)">{Math.round(minTemp)}°</text>
          {/* X axis ticks */}
          {xTicks.map((h,i) => {
            const realIdx = pts.indexOf(h);
            return (
              <text key={i} x={xOf(realIdx)} y={padT+plotH+14} textAnchor="middle" fontSize="9" fill="rgba(15,45,30,0.62)">
                {h.isNow ? 'NOW' : fmtHour(h.time)}
              </text>
            );
          })}
          {/* Legend */}
          <circle cx={padL} cy={padT-6} r="4" fill="#16a34a" />
          <text x={padL+8} y={padT-2} fontSize="9" fill="rgba(15,45,30,0.82)">≤7 mph</text>
          <circle cx={padL+58} cy={padT-6} r="4" fill="#d97706" />
          <text x={padL+66} y={padT-2} fontSize="9" fill="rgba(15,45,30,0.82)">7–10</text>
          <circle cx={padL+108} cy={padT-6} r="4" fill="#dc2626" />
          <text x={padL+116} y={padT-2} fontSize="9" fill="rgba(15,45,30,0.82)">&gt;10 mph</text>
          <rect x={padL+160} y={padT-10} width={18} height={8} fill="rgba(34,197,94,0.2)" />
          <text x={padL+182} y={padT-2} fontSize="9" fill="rgba(15,45,30,0.82)">Spray window</text>
          <line x1={padL+272} y1={padT-6} x2={padL+290} y2={padT-6} stroke="rgba(37,99,235,0.5)" strokeWidth="1.5" strokeDasharray="4 3" />
          <text x={padL+294} y={padT-2} fontSize="9" fill="rgba(15,45,30,0.82)">Temp (°F)</text>
        </svg>
      );
    }

    /* ─── Compatibility Panel ─────────────────────────────────── */
    function CompatibilityPanel({ herbs }) {
      if (herbs.length < 2) return null;
      const triggered = COMPATIBILITY_RULES.filter(r => r.test(herbs));
      const colors = { incompatible:{ bg:'rgba(239,68,68,0.08)', border:'rgba(239,68,68,0.4)', text:'#f87171', icon:'✗' }, caution:{ bg:'rgba(251,191,36,0.08)', border:'rgba(251,191,36,0.35)', text:'#fbbf24', icon:'⚠' }, note:{ bg:'rgba(96,165,250,0.08)', border:'rgba(96,165,250,0.3)', text:'#93c5fd', icon:'ℹ' } };
      return (
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <p style={{margin:'0 0 4px',color:'rgba(15,45,30,0.82)',fontSize:11,fontWeight:700,letterSpacing:2,textTransform:'uppercase'}}>Tank-Mix Compatibility</p>
          {triggered.length === 0 ? (
            <div style={{display:'flex',gap:10,alignItems:'center',background:'rgba(34,197,94,0.08)',border:'1px solid rgba(34,197,94,0.3)',borderRadius:10,padding:'10px 14px'}}>
              <span style={{color:'#4ade80',fontWeight:800,fontSize:16}}>✓</span>
              <span style={{color:'rgba(15,45,30,0.88)',fontSize:13}}>No compatibility issues detected between selected products.</span>
            </div>
          ) : triggered.map((r,i) => {
            const c = colors[r.status];
            const names = r.getNames(herbs);
            return (
              <div key={i} style={{background:c.bg,border:`1px solid ${c.border}`,borderLeft:`3px solid ${c.text}`,borderRadius:10,padding:'10px 14px',display:'flex',gap:10,alignItems:'flex-start'}}>
                <span style={{color:c.text,fontWeight:800,fontSize:15,flexShrink:0,marginTop:1}}>{c.icon}</span>
                <div>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:4}}>
                    {names.map(n=><span key={n} style={{background:'rgba(5,150,105,0.10)',border:'1px solid rgba(5,150,105,0.20)',borderRadius:8,padding:'1px 8px',fontSize:11,fontWeight:700,color:'rgba(15,45,30,0.9)'}}>{n}</span>)}
                  </div>
                  <span style={{color:'rgba(15,45,30,0.88)',fontSize:12,lineHeight:1.5}}>{r.message}</span>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    /* ─── Adjuvant Panel ──────────────────────────────────────── */
    function AdjuvantPanel({ herbs }) {
      if (herbs.length === 0) return null;
      const noSurf = herbs.filter(h => (ADJUVANT_DB[h.id]||'').toLowerCase().includes('no ams') || (ADJUVANT_DB[h.id]||'').toLowerCase().includes('no surfactant'));
      const needsSurf = herbs.filter(h => { const a=(ADJUVANT_DB[h.id]||''); return (a.includes('COC')||a.includes('MSO')||a.includes('NIS')) && !noSurf.find(x=>x.id===h.id); });
      const conflict = noSurf.length > 0 && needsSurf.length > 0;
      return (
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <p style={{margin:'0 0 4px',color:'rgba(15,45,30,0.82)',fontSize:11,fontWeight:700,letterSpacing:2,textTransform:'uppercase'}}>Adjuvant Requirements</p>
          {conflict && (
            <div style={{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.4)',borderRadius:10,padding:'10px 14px',display:'flex',gap:8,alignItems:'flex-start'}}>
              <span style={{color:'#f87171',fontWeight:800,fontSize:15,flexShrink:0}}>⚠</span>
              <span style={{color:'rgba(15,45,30,0.8)',fontSize:12,lineHeight:1.5}}>
                <strong style={{color:'#f87171'}}>Adjuvant conflict:</strong> {noSurf.map(h=>h.name).join(', ')} requires NO surfactant, but {needsSurf.map(h=>h.name).join(', ')} requires one. Apply separately or verify with your agronomist.
              </span>
            </div>
          )}
          {herbs.map(h => {
            const adj = ADJUVANT_DB[h.id] || 'See product label for adjuvant recommendations';
            const isNone = adj.toLowerCase().startsWith('none');
            const isConflict = adj.toLowerCase().includes('no ams') || adj.toLowerCase().includes('no surfactant');
            return (
              <div key={h.id} style={{display:'flex',gap:12,alignItems:'flex-start',background:'#ffffff',border:'1px solid rgba(5,150,105,0.12)',borderRadius:10,padding:'10px 14px'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:'rgba(15,45,30,0.92)',fontSize:13,fontWeight:700,marginBottom:2}}>{h.name}</div>
                  <div style={{color: isConflict?'#dc2626':isNone?'rgba(15,45,30,0.82)':'#2563eb', fontSize:12,lineHeight:1.5}}>{adj}</div>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    /* ─── Resistance Management Panel ────────────────────────── */
    const RESISTANCE_ALERTS = {
      '9': 'Glyphosate-resistant waterhemp, Palmer amaranth, and horseweed (marestail) are confirmed across the US Midwest and South. Always rotate modes of action.',
      '2': 'ALS resistance is widespread in many weed species. Do not rely on a single ALS product — rotate with PPO, HPPD, or other modes.',
      '14': 'PPO-resistant waterhemp is confirmed in multiple Midwestern states. Pair with a residual from a different mode of action.',
      '5': 'Triazine (atrazine) resistance is common in pigweed and lambsquarters in heavily treated areas.',
      '1': 'ACCase resistance is documented in Italian ryegrass, wild oat, and blackgrass in some regions.',
    };
    function ResistancePanel({ herbs }) {
      if (herbs.length === 0) return null;
      const allGroups = herbs.flatMap(h => (h.group||'').split('+').map(g=>g.trim()).filter(Boolean));
      const uniqueGroups = [...new Set(allGroups)];
      const n = uniqueGroups.length;
      const score = n >= 3 ? 'good' : n === 2 ? 'moderate' : 'risk';
      const cfg = { good:{color:'#4ade80',bg:'rgba(34,197,94,0.08)',border:'rgba(34,197,94,0.3)',label:'GOOD — Multiple Modes'}, moderate:{color:'#fbbf24',bg:'rgba(251,191,36,0.08)',border:'rgba(251,191,36,0.3)',label:'MODERATE — Two Modes'}, risk:{color:'#f87171',bg:'rgba(239,68,68,0.08)',border:'rgba(239,68,68,0.35)',label:'HIGH RISK — Single Mode'} };
      const c = cfg[score];
      const alerts = uniqueGroups.flatMap(g => RESISTANCE_ALERTS[g] ? [{ group:g, msg:RESISTANCE_ALERTS[g] }] : []);
      const allPost = herbs.every(h => h.type && h.type.includes('POST') && !h.type.includes('PRE'));
      return (
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <p style={{margin:'0 0 4px',color:'rgba(15,45,30,0.82)',fontSize:11,fontWeight:700,letterSpacing:2,textTransform:'uppercase'}}>Resistance Management</p>
          <div style={{background:c.bg,border:`1px solid ${c.border}`,borderRadius:10,padding:'12px 14px',display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{color:c.color,fontWeight:800,fontSize:13}}>{c.label}</span>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {uniqueGroups.map(g=><span key={g} style={{background:'rgba(5,150,105,0.10)',border:`1px solid ${c.border}`,color:c.color,fontSize:10,fontWeight:800,padding:'2px 8px',borderRadius:8}}>Group {g}</span>)}
            </div>
          </div>
          {allPost && (
            <div style={{background:'rgba(251,191,36,0.07)',border:'1px solid rgba(251,191,36,0.3)',borderRadius:10,padding:'10px 14px',display:'flex',gap:8,alignItems:'flex-start'}}>
              <span style={{color:'#fbbf24',fontWeight:800,flexShrink:0}}>💡</span>
              <span style={{color:'rgba(15,45,30,0.88)',fontSize:12,lineHeight:1.5}}>All selected products are POST-emergence only. Consider adding a PRE residual herbicide from a different mode of action for extended weed control and resistance management.</span>
            </div>
          )}
          {alerts.map(a=>(
            <div key={a.group} style={{background:'#ffffff',border:'1px solid rgba(5,150,105,0.13)',borderRadius:10,padding:'10px 14px',display:'flex',gap:8,alignItems:'flex-start'}}>
              <span style={{color:'rgba(15,45,30,0.82)',fontWeight:800,flexShrink:0,fontSize:12}}>G{a.group}</span>
              <span style={{color:'rgba(15,45,30,0.88)',fontSize:12,lineHeight:1.5}}>{a.msg}</span>
            </div>
          ))}
        </div>
      );
    }

    /* ─── Rate Calculator ─────────────────────────────────────── */
    function RateCalculator({ herbs, fieldAcres, setFieldAcres, targetGPA, setTargetGPA }) {
      const [localGPA, setLocalGPA]   = React.useState(targetGPA||15);
      const [userRates, setUserRates] = React.useState({});
      const acres = parseFloat(fieldAcres) || 0;

      const parseRate = (rateStr) => {
        const m = rateStr.match(/(\d+\.?\d*)\s*[–\-]\s*(\d+\.?\d*)\s*(fl oz|oz|pt|qt|lb)/i);
        if (!m) return null;
        return { lo: parseFloat(m[1]), hi: parseFloat(m[2]), unit: m[3].toLowerCase() };
      };
      const toGal = (val, unit) => {
        if (unit==='fl oz') return (val/128).toFixed(2);
        if (unit==='pt') return (val/8).toFixed(2);
        if (unit==='qt') return (val/4).toFixed(2);
        return null;
      };

      return (
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {/* Field size + GPA row */}
          <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
            <div style={{display:'flex',flexDirection:'column',gap:4,flex:1,minWidth:140}}>
              <label style={{color:'rgba(15,45,30,0.84)',fontSize:10,fontWeight:700,letterSpacing:1,textTransform:'uppercase'}}>Field Size (acres)</label>
              <input type="number" min="0" value={fieldAcres} onChange={e=>setFieldAcres(e.target.value)} placeholder="e.g. 120"
                style={{background:'#f0fdf9',border:'1px solid rgba(5,150,105,0.25)',borderRadius:8,padding:'8px 12px',color:'#0f2d1e',fontSize:14,fontFamily:'inherit'}} />
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:4,flex:1,minWidth:140}}>
              <label style={{color:'rgba(15,45,30,0.84)',fontSize:10,fontWeight:700,letterSpacing:1,textTransform:'uppercase'}}>Carrier Volume (GPA)</label>
              <input type="number" min="1" value={localGPA} onChange={e=>{setLocalGPA(e.target.value);setTargetGPA&&setTargetGPA(e.target.value);}}
                style={{background:'#f0fdf9',border:'1px solid rgba(5,150,105,0.25)',borderRadius:8,padding:'8px 12px',color:'#0f2d1e',fontSize:14,fontFamily:'inherit'}} />
            </div>
          </div>

          {/* Per-product rate cards */}
          {herbs.map(h => {
            const r        = parseRate(h.rate);
            const maxAnn   = MAX_ANNUAL_DB[h.id] || null;
            const uVal     = userRates[h.id] || '';
            const uNum     = parseFloat(uVal) || 0;
            const uUnit    = r ? r.unit : 'fl oz';
            const overMax  = r && uNum > r.hi && uNum > 0;
            const underMin = r && uNum > 0 && uNum < r.lo;
            const uOk      = r && uNum >= r.lo && uNum <= r.hi;

            return (
              <div key={h.id} style={{background:'#ffffff',border:'1px solid rgba(5,150,105,0.12)',borderRadius:12,padding:'14px 16px',display:'flex',flexDirection:'column',gap:10}}>
                {/* Product name + label range + max annual */}
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
                  <div>
                    <div style={{color:'rgba(15,45,30,0.95)',fontSize:14,fontWeight:800}}>{h.name}</div>
                    <div style={{color:'rgba(15,45,30,0.68)',fontSize:11,marginTop:2}}>Label range: <span style={{color:'rgba(15,45,30,0.80)'}}>{h.rate}</span></div>
                  </div>
                  {maxAnn && (
                    <div style={{background:'rgba(251,191,36,0.08)',border:'1px solid rgba(251,191,36,0.3)',borderRadius:8,padding:'6px 10px',maxWidth:280,flex:'0 0 auto'}}>
                      <div style={{color:'rgba(251,191,36,0.75)',fontSize:9,fontWeight:800,letterSpacing:1.2,textTransform:'uppercase',marginBottom:2}}>⚠ Max Annual Application</div>
                      <div style={{color:'rgba(15,45,30,0.88)',fontSize:11,lineHeight:1.4}}>{maxAnn}</div>
                    </div>
                  )}
                </div>

                {/* Your rate input + totals */}
                <div style={{display:'flex',gap:12,alignItems:'flex-end',flexWrap:'wrap'}}>
                  <div style={{display:'flex',flexDirection:'column',gap:4}}>
                    <label style={{color:'rgba(15,45,30,0.84)',fontSize:10,fontWeight:700,letterSpacing:1,textTransform:'uppercase'}}>
                      Your Rate {r ? `(${r.unit}/ac)` : '(per acre)'}
                    </label>
                    <input
                      type="number" min="0" step="0.1"
                      value={uVal}
                      onChange={e=>setUserRates(prev=>({...prev,[h.id]:e.target.value}))}
                      placeholder={r ? `${r.lo}–${r.hi}` : 'enter rate'}
                      style={{
                        background:'#ffffff',
                        border:`1px solid ${overMax?'rgba(239,68,68,0.6)':underMin?'rgba(251,191,36,0.5)':uOk?'rgba(74,222,128,0.5)':'rgba(5,150,105,0.22)'}`,
                        borderRadius:8,padding:'9px 12px',color:'#0f2d1e',fontSize:15,fontFamily:'inherit',width:140
                      }}
                    />
                    {overMax  && <span style={{color:'#f87171',fontSize:10,fontWeight:700}}>⚠ Exceeds label max ({r.hi} {r.unit}/ac)</span>}
                    {underMin && <span style={{color:'#fbbf24',fontSize:10,fontWeight:700}}>⚠ Below label minimum ({r.lo} {r.unit}/ac)</span>}
                    {uOk      && <span style={{color:'#4ade80',fontSize:10,fontWeight:700}}>✓ Within label range</span>}
                  </div>

                  {/* Total for field */}
                  {acres > 0 && uNum > 0 && (
                    <div style={{background:`rgba(${overMax?'239,68,68':uOk?'34,197,94':'96,165,250'},0.09)`,border:`1px solid rgba(${overMax?'239,68,68':uOk?'34,197,94':'96,165,250'},0.3)`,borderRadius:10,padding:'10px 14px',display:'flex',flexDirection:'column',gap:2,minWidth:140}}>
                      <div style={{color:'rgba(15,45,30,0.82)',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>Total — {acres} ac</div>
                      <div style={{color:overMax?'#f87171':uOk?'#4ade80':'#60a5fa',fontSize:20,fontWeight:900,lineHeight:1}}>{(uNum*acres).toFixed(1)} <span style={{fontSize:13}}>{uUnit}</span></div>
                      {toGal(uNum*acres,uUnit)&&<div style={{color:'rgba(15,45,30,0.68)',fontSize:11}}>= {toGal(uNum*acres,uUnit)} gal</div>}
                    </div>
                  )}

                  {/* Label range reference (when no user rate entered yet) */}
                  {acres > 0 && uNum === 0 && r && (
                    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                      <div style={{background:'rgba(96,165,250,0.06)',border:'1px solid rgba(96,165,250,0.15)',borderRadius:8,padding:'8px 12px',textAlign:'center'}}>
                        <div style={{color:'rgba(15,45,30,0.68)',fontSize:10,marginBottom:2}}>Low rate total</div>
                        <div style={{color:'#60a5fa',fontWeight:700,fontSize:13}}>{(r.lo*acres).toFixed(1)} {r.unit}</div>
                        {toGal(r.lo*acres,r.unit)&&<div style={{color:'rgba(15,45,30,0.62)',fontSize:10}}>{toGal(r.lo*acres,r.unit)} gal</div>}
                      </div>
                      <div style={{background:'rgba(248,113,113,0.06)',border:'1px solid rgba(248,113,113,0.15)',borderRadius:8,padding:'8px 12px',textAlign:'center'}}>
                        <div style={{color:'rgba(15,45,30,0.68)',fontSize:10,marginBottom:2}}>High rate total</div>
                        <div style={{color:'#f87171',fontWeight:700,fontSize:13}}>{(r.hi*acres).toFixed(1)} {r.unit}</div>
                        {toGal(r.hi*acres,r.unit)&&<div style={{color:'rgba(15,45,30,0.62)',fontSize:10}}>{toGal(r.hi*acres,r.unit)} gal</div>}
                      </div>
                    </div>
                  )}

                  {acres > 0 && uNum === 0 && !r && (
                    <span style={{color:'rgba(15,45,30,0.62)',fontSize:12,alignSelf:'center'}}>Rate: {h.rate} — enter manually above</span>
                  )}
                </div>
              </div>
            );
          })}

          {/* Total carrier water */}
          {acres > 0 && (
            <div style={{background:'rgba(96,165,250,0.08)',border:'1px solid rgba(96,165,250,0.3)',borderRadius:10,padding:'10px 14px',display:'flex',gap:8,alignItems:'center'}}>
              <span style={{fontSize:18}}>💧</span>
              <span style={{color:'rgba(147,197,253,0.9)',fontSize:13,fontWeight:700}}>Total carrier water: {(acres*(parseFloat(localGPA)||15)).toFixed(0)} gallons ({acres} ac × {localGPA} GPA)</span>
            </div>
          )}
          {!acres && <p style={{color:'rgba(15,45,30,0.72)',fontSize:12,margin:0,textAlign:'center'}}>Enter field size above to calculate product quantities.</p>}
        </div>
      );
    }

    /* ─── Nozzle Calibration Calculator ──────────────────────── */
    function NozzleCalculator({ recommendedGPA, fieldAcres }) {
      const [tipFlow, setTipFlow]   = React.useState('0.40');
      const [speed, setSpeed]       = React.useState('10');
      const [spacing, setSpacing]   = React.useState('15');
      const [tankSize, setTankSize] = React.useState('');
      const acres = parseFloat(fieldAcres)||0;
      const gpa = ((parseFloat(tipFlow)*5940)/(parseFloat(spacing)*parseFloat(speed))).toFixed(2);
      const recGPA = parseFloat(recommendedGPA)||15;
      const gpaNum = parseFloat(gpa);
      const inRange = gpaNum >= recGPA * 0.8 && gpaNum <= recGPA * 1.3;
      const gpaColor = inRange ? '#4ade80' : '#fbbf24';
      const tanksPerField = acres && tankSize ? (acres * gpaNum / parseFloat(tankSize)).toFixed(1) : null;
      return (
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:10}}>
            {[
              {label:'Tip Flow (gpm)', val:tipFlow, set:setTipFlow, opts:['0.20','0.30','0.40','0.50','0.60']},
              {label:'Speed (mph)', val:speed, set:setSpeed, type:'number'},
              {label:'Nozzle Spacing (in)', val:spacing, set:setSpacing, type:'number'},
              {label:'Tank Size (gal)', val:tankSize, set:setTankSize, type:'number', placeholder:'optional'},
            ].map(f=>(
              <div key={f.label} style={{display:'flex',flexDirection:'column',gap:4}}>
                <label style={{color:'rgba(15,45,30,0.84)',fontSize:10,fontWeight:700,letterSpacing:1,textTransform:'uppercase'}}>{f.label}</label>
                {f.opts ? (
                  <select value={f.val} onChange={e=>f.set(e.target.value)} style={{background:'#f0fdf9',border:'1px solid rgba(5,150,105,0.25)',borderRadius:8,padding:'8px 10px',color:'#0f2d1e',fontSize:14,fontFamily:'inherit'}}>
                    {f.opts.map(o=><option key={o} value={o}>{o} gpm</option>)}
                  </select>
                ) : (
                  <input type={f.type||'text'} value={f.val} onChange={e=>f.set(e.target.value)} placeholder={f.placeholder||''}
                    style={{background:'#f0fdf9',border:'1px solid rgba(5,150,105,0.25)',borderRadius:8,padding:'8px 10px',color:'#0f2d1e',fontSize:14,fontFamily:'inherit'}} />
                )}
              </div>
            ))}
          </div>
          <div style={{background:'#ffffff',border:`1px solid rgba(5,150,105,0.13)`,borderRadius:12,padding:'14px 18px',display:'flex',flexWrap:'wrap',gap:16,alignItems:'center'}}>
            <div style={{textAlign:'center'}}>
              <div style={{color:'rgba(15,45,30,0.82)',fontSize:10,fontWeight:700,letterSpacing:1,textTransform:'uppercase'}}>Calculated GPA</div>
              <div style={{color:gpaColor,fontSize:28,fontWeight:900}}>{isNaN(gpaNum)?'—':gpa}</div>
              <div style={{color:'rgba(15,45,30,0.62)',fontSize:10}}>{inRange?'✓ Within rec range':'⚠ Outside rec range'}</div>
            </div>
            <div style={{flex:1,fontSize:12,color:'rgba(15,45,30,0.88)',lineHeight:1.6,minWidth:180}}>
              <div>Formula: (tip flow × 5940) ÷ (spacing × speed)</div>
              <div>= ({tipFlow} × 5940) ÷ ({spacing} × {speed})</div>
              {tanksPerField && <div style={{color:'rgba(147,197,253,0.8)',marginTop:4}}>💧 {tanksPerField} tank-loads for {acres} ac</div>}
            </div>
          </div>
          <p style={{margin:0,color:'rgba(15,45,30,0.72)',fontSize:11}}>Tip: Increasing pressure from 30→40 PSI increases flow ~15% — recheck GPA after any pressure change. Verify with a catch test before field application.</p>
        </div>
      );
    }

    /* ─── Main App ────────────────────────────────────────────── */
    function App() {
      const [query, setQuery]           = useState('');
      const [weather, setWeather]       = useState(null);
      const [loading, setLoading]       = useState(false);
      const [error, setError]           = useState('');
      const [locName, setLocName]       = useState('');
      const [selectedHerbs, setSelectedHerbs] = useState([]);
      const [suggestions, setSuggestions] = useState([]);
      const [showDrop, setShowDrop]     = useState(false);
      const [activeIdx, setActiveIdx]   = useState(-1);
      const [sugLoading, setSugLoading] = useState(false);
      const [savedLocs, setSavedLocs]   = useState(() => {
        try { return JSON.parse(localStorage.getItem('sprayAssistant_savedLocs') || '[]'); } catch { return []; }
      });
      const [showRateCalc, setShowRateCalc]   = useState(false);
      const [showNozzleCalc, setShowNozzleCalc] = useState(false);
      const [fieldAcres, setFieldAcres]       = useState('');
      const [selectedCrop, setSelectedCrop]   = useState('all');
      const searchWrapRef = useRef(null);
      const debounceRef   = useRef(null);

      const loadWeather = useCallback(async (lat, lon, name) => {
        setLoading(true); setError(''); setShowDrop(false); setSuggestions([]);
        try {
          const url = [
            `https://api.open-meteo.com/v1/forecast`,
            `?latitude=${lat}&longitude=${lon}`,
            `&current=temperature_2m,wind_speed_10m,wind_direction_10m`,
            `&hourly=temperature_2m,wind_speed_10m,wind_direction_10m,precipitation_probability,relative_humidity_2m,cloud_cover`,
            `&wind_speed_unit=mph&temperature_unit=fahrenheit&forecast_days=2&timezone=auto`
          ].join('');
          const res  = await fetch(url);
          const data = await res.json();
          if (data.error) throw new Error(data.reason || 'API error');
          setWeather(data);
          setLocName(name);
        } catch (e) {
          setError('Weather fetch failed — check your connection and try again.');
        }
        setLoading(false);
      }, []);

      /* Debounced autocomplete — US only, up to 8 results */
      useEffect(() => {
        clearTimeout(debounceRef.current);
        const q = query.trim();
        if (q.length < 2) { setSuggestions([]); setShowDrop(false); return; }
        debounceRef.current = setTimeout(async () => {
          setSugLoading(true);
          try {
            const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=20&language=en&format=json`;
            const res  = await fetch(url);
            const data = await res.json();
            const us = (data.results || [])
              .filter(r => r.country_code === 'US')
              .slice(0, 8)
              .map(r => ({
                id:    r.id,
                lat:   r.latitude,
                lon:   r.longitude,
                city:  r.name,
                state: r.admin1  || '',
                county:r.admin2  || '',
                label: [r.name, r.admin1].filter(Boolean).join(', '),
                sub:   r.admin2 ? `${r.admin2} County` : '',
              }));
            setSuggestions(us);
            setShowDrop(us.length > 0);
            setActiveIdx(-1);
          } catch { /* silent */ }
          setSugLoading(false);
        }, 280);
        return () => clearTimeout(debounceRef.current);
      }, [query]);

      /* Close dropdown on outside click */
      useEffect(() => {
        function handleOutside(e) {
          if (searchWrapRef.current && !searchWrapRef.current.contains(e.target)) {
            setShowDrop(false);
          }
        }
        document.addEventListener('mousedown', handleOutside);
        return () => document.removeEventListener('mousedown', handleOutside);
      }, []);

      const selectSuggestion = (s) => {
        setQuery(s.label);
        loadWeather(s.lat, s.lon, s.label);
      };

      const handleKeyDown = (e) => {
        if (!showDrop || suggestions.length === 0) return;
        if (e.key === 'ArrowDown')  { e.preventDefault(); setActiveIdx(i => Math.min(i + 1, suggestions.length - 1)); }
        if (e.key === 'ArrowUp')    { e.preventDefault(); setActiveIdx(i => Math.max(i - 1, 0)); }
        if (e.key === 'Enter')      { e.preventDefault(); if (activeIdx >= 0) selectSuggestion(suggestions[activeIdx]); }
        if (e.key === 'Escape')     { setShowDrop(false); }
      };

      const handleGeo = () => {
        if (!navigator.geolocation) { setError('Geolocation not supported by your browser.'); return; }
        setLoading(true);
        navigator.geolocation.getCurrentPosition(
          p => loadWeather(p.coords.latitude, p.coords.longitude, 'Your Farm Location'),
          () => { setError('Could not access location. Search manually.'); setLoading(false); }
        );
      };

      /* Derived data */
      let status = null, curWind = null, curDir = null, curTemp = null;
      let curRain = 0, hourly = [], windows = [], greenBlocks = [], curRain2h = 0;
      let curRH = null, curCloud = null, inversionRisk = false, inversionHigh = false;

      if (weather) {
        const c   = weather.current;
        const now = new Date();
        const times = weather.hourly.time;
        let idx = times.findIndex(t => new Date(t) >= now);
        if (idx < 0) idx = 0;

        const precip = weather.hourly.precipitation_probability;
        const rh = weather.hourly.relative_humidity_2m;
        const cc = weather.hourly.cloud_cover;
        curWind  = c.wind_speed_10m;
        curDir   = c.wind_direction_10m;
        curTemp  = c.temperature_2m;
        curRain  = precip[idx] ?? 0;
        curRH    = rh ? (rh[idx] ?? null) : null;
        curCloud = cc ? (cc[idx] ?? null) : null;

        curRain2h = Math.max(...precip.slice(idx, idx + 2).map(v => v ?? 0));
        const rain4h = Math.max(...precip.slice(idx, idx + 4).map(v => v ?? 0));
        status = sprayStatus(curWind, curRain2h, rain4h);

        /* Inversion risk: calm wind is the primary signal */
        inversionRisk = curWind < 3;
        inversionHigh = inversionRisk && curRH !== null && curRH > 90;

        hourly = times.slice(idx, idx + 24).map((t, i) => ({
          time:  t,
          wind:  weather.hourly.wind_speed_10m[idx + i],
          dir:   weather.hourly.wind_direction_10m[idx + i],
          rain:  precip[idx + i] ?? 0,
          temp:  weather.hourly.temperature_2m[idx + i],
          isNow: i === 0,
        }));

        windows = hourly.filter(h => sprayStatus(h.wind, h.rain, h.rain) === 'green');

        /* Group consecutive green hours into time blocks */
        let gb = null;
        for (const h of hourly) {
          const ok = sprayStatus(h.wind, h.rain, h.rain) === 'green';
          if (ok) { if (!gb) gb = { start: h, end: h, hours: [h] }; else { gb.end = h; gb.hours.push(h); } }
          else { if (gb) { greenBlocks.push(gb); gb = null; } }
        }
        if (gb) greenBlocks.push(gb);
      }

      const saveLocation = () => {
        if (!weather || !locName) return;
        const loc = { name: locName, lat: weather.latitude, lon: weather.longitude };
        setSavedLocs(prev => {
          const filtered = prev.filter(l => l.name !== loc.name).slice(0, 4);
          const next = [loc, ...filtered];
          localStorage.setItem('sprayAssistant_savedLocs', JSON.stringify(next));
          return next;
        });
      };
      const removeSavedLoc = (name) => {
        setSavedLocs(prev => {
          const next = prev.filter(l => l.name !== name);
          localStorage.setItem('sprayAssistant_savedLocs', JSON.stringify(next));
          return next;
        });
      };

      const printRecord = () => {
        const herbRows = selectedHerbs.map(h =>
          `<tr><td>${h.name}</td><td>${h.rate}</td><td>${h.rei}</td><td>${h.phi}</td><td>${ADJUVANT_DB[h.id]||'See label'}</td></tr>`
        ).join('');
        const nozzleName = selectedHerbs.some(h => h.moa&&h.moa.toLowerCase().includes('dicamba')) ? 'TeeJet TTI11004VP (XC–UC — Dicamba Label)' : curWind < 7 ? 'TeeJet XR11004VP (Medium)' : curWind < 10 ? 'TeeJet AIXR11004VP (Coarse–VC)' : 'TeeJet TTI11004VP (VC–UC)';
        const html = `<div class="print-record">
          <h1>🌿 Spray Application Record</h1>
          <div class="pr-row"><span class="pr-label">Date / Time:</span><span>${new Date().toLocaleString()}</span></div>
          <div class="pr-row"><span class="pr-label">Location:</span><span>${locName||'—'}</span></div>
          <div class="pr-row"><span class="pr-label">GPS:</span><span>${weather?`${weather.latitude.toFixed(4)}, ${weather.longitude.toFixed(4)}`:'—'}</span></div>
          <div class="pr-section">Conditions at Application</div>
          <div class="pr-row"><span class="pr-label">Wind Speed:</span><span>${curWind!=null?Math.round(curWind)+' mph':'—'}</span></div>
          <div class="pr-row"><span class="pr-label">Wind Direction:</span><span>${curDir!=null?degToCompass(curDir)+' ('+Math.round(curDir)+'°)':'—'}</span></div>
          <div class="pr-row"><span class="pr-label">Temperature:</span><span>${curTemp!=null?Math.round(curTemp)+'°F':'—'}</span></div>
          <div class="pr-row"><span class="pr-label">Rain Probability:</span><span>${curRain}%</span></div>
          <div class="pr-row"><span class="pr-label">Spray Decision:</span><span style="font-weight:700">${status?status.toUpperCase():'—'}</span></div>
          <div class="pr-section">Equipment</div>
          <div class="pr-row"><span class="pr-label">Nozzle Used:</span><span>${nozzleName}</span></div>
          <div class="pr-row"><span class="pr-label">Carrier Volume:</span><span>_______  GPA</span></div>
          <div class="pr-row"><span class="pr-label">Boom Height:</span><span>_______  inches</span></div>
          <div class="pr-row"><span class="pr-label">Ground Speed:</span><span>_______  mph</span></div>
          ${selectedHerbs.length>0?`<div class="pr-section">Products Applied</div><table class="pr-table"><thead><tr><th>Product</th><th>Rate</th><th>REI</th><th>PHI</th><th>Adjuvant</th></tr></thead><tbody>${herbRows}</tbody></table>`:''}
          <div class="pr-section">Certification</div>
          <div style="display:flex;gap:48px;margin-top:16px">
            <div><span class="sig-line">Applicator Signature</span></div>
            <div><span class="sig-line">License / CCA Number</span></div>
            <div><span class="sig-line">Farm / Field Name</span></div>
          </div>
          <p style="margin-top:24px;font-size:11px;color:#666">Always read and follow the pesticide label — it is the law. Retain this record for a minimum of 2 years.</p>
        </div>`;
        const w = window.open('','_blank','width=800,height=900');
        w.document.write(`<!DOCTYPE html><html><head><title>Spray Record</title><style>body{font-family:Arial,sans-serif;padding:32px;color:#000}.print-record h1{font-size:20px;border-bottom:2px solid #000;padding-bottom:8px}.pr-row{display:flex;gap:16px;margin:6px 0;font-size:13px}.pr-label{font-weight:700;min-width:160px}.pr-section{margin:18px 0 8px;font-size:15px;font-weight:700;border-bottom:1px solid #ccc;padding-bottom:4px}.pr-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}.pr-table th{background:#f0f0f0;border:1px solid #ccc;padding:6px 8px;text-align:left}.pr-table td{border:1px solid #ccc;padding:5px 8px}.sig-line{display:inline-block;border-top:1px solid #000;width:200px;padding-top:4px;font-size:11px}</style></head><body>${html}<\/script></body></html>`);
        w.document.close();
      };

      const sc = status ? STATUS_CFG[status] : null;

      return (
        <div style={{ minHeight: '100vh', color: '#0f2d1e', fontFamily: 'Inter, system-ui, sans-serif', position:'relative' }}>

          {/* ── No background orbs — clean white theme ── */}

          {/* ── All content sits above orbs ── */}
          <div style={{ position:'relative', zIndex:1 }}>

          {/* ── Header ── */}
          <header style={{ maxWidth: 900, margin: '0 auto', padding: '32px 24px 0' }}>
            <div style={{ display:'flex', alignItems:'center', gap: 14, marginBottom: 4 }}>
              <span style={{ fontSize: 40 }}>🌿</span>
              <div>
                <h1 style={{ margin:0, fontSize: 24, fontWeight: 900, color: '#0f2d1e', letterSpacing: -0.5 }}>
                  Smart Spraying Assistant
                </h1>
                <p style={{ margin:0, fontSize: 13, color: 'rgba(15,45,30,0.88)', fontWeight: 500 }}>
                  Precision ag — pesticide application decision support
                </p>
              </div>
            </div>
          </header>

          {/* ── Search Bar ── */}
          <div style={{ maxWidth: 900, margin: '20px auto 0', padding: '0 24px' }}>
            <div className="frost" style={{ background:'#f0fdf9', borderRadius: 18, padding: 20, border: '1px solid rgba(5,150,105,0.18)', boxShadow:'0 4px 32px rgba(0,0,0,0.07)' }}>
              <p style={{ margin:'0 0 12px', fontSize: 13, color: 'rgba(15,45,30,0.80)', fontWeight: 500 }}>
                Enter your farm location to check spray conditions
              </p>
              {/* Saved locations chips */}
              {savedLocs.length > 0 && (
                <div style={{ display:'flex', gap: 8, flexWrap:'wrap', marginBottom: 12 }}>
                  <span style={{ color:'rgba(15,45,30,0.62)', fontSize: 11, fontWeight: 700, letterSpacing: 1, textTransform:'uppercase', alignSelf:'center' }}>Saved:</span>
                  {savedLocs.map(loc => (
                    <div key={loc.name} style={{ display:'flex', alignItems:'center', gap: 4, background:'#ecfdf5', border:'1px solid rgba(5,150,105,0.20)', borderRadius: 20, padding: '4px 10px 4px 12px' }}>
                      <button onClick={() => { setQuery(loc.name); loadWeather(loc.lat, loc.lon, loc.name); }} style={{ background:'none', border:'none', color:'rgba(15,45,30,0.9)', fontSize: 12, fontWeight: 600, cursor:'pointer', padding: 0, fontFamily:'inherit' }}>
                        📍 {loc.name}
                      </button>
                      <button onClick={() => removeSavedLoc(loc.name)} style={{ background:'none', border:'none', color:'rgba(15,45,30,0.68)', fontSize: 13, cursor:'pointer', padding: '0 0 0 4px', lineHeight: 1 }}>×</button>
                    </div>
                  ))}
                </div>
              )}
              <div style={{ display:'flex', gap: 10, flexWrap:'wrap', alignItems:'flex-start' }}>

                {/* Input + dropdown wrapper */}
                <div ref={searchWrapRef} style={{ flex: 1, minWidth: 220, position: 'relative' }}>
                  <div style={{ position: 'relative', display: 'flex', alignItems: 'center' }}>
                    <input
                      type="text"
                      value={query}
                      onChange={e => { setQuery(e.target.value); setShowDrop(true); }}
                      onFocus={e  => { e.target.style.borderColor = 'rgba(5,150,105,0.75)'; e.target.style.boxShadow = '0 0 0 3px rgba(5,150,105,0.12)'; if (suggestions.length > 0) setShowDrop(true); }}
                      onBlur={e   => { e.target.style.borderColor = 'rgba(5,150,105,0.18)'; e.target.style.boxShadow = 'none'; }}
                      onKeyDown={handleKeyDown}
                      placeholder="City or town name (US)..."
                      autoComplete="off"
                      style={{
                        width: '100%', background: '#ffffff',
                        border: '1px solid rgba(5,150,105,0.3)', borderRadius: 12,
                        padding: '10px 40px 10px 16px', color: '#0f2d1e', fontSize: 14,
                        outline: 'none', fontFamily: 'inherit', transition: 'border-color 0.15s, box-shadow 0.15s'
                      }}
                    />
                    {/* Spinner inside input */}
                    {sugLoading && (
                      <div style={{
                        position:'absolute', right: 12, top: '50%', transform: 'translateY(-50%)',
                        width: 16, height: 16, border: '2px solid rgba(5,150,105,0.25)',
                        borderTopColor: '#059669', borderRadius: '50%',
                        animation: 'spin 0.7s linear infinite', pointerEvents:'none'
                      }} />
                    )}
                  </div>

                  {/* Dropdown */}
                  {showDrop && suggestions.length > 0 && (
                    <div style={{
                      position: 'absolute', top: 'calc(100% + 6px)', left: 0, right: 0,
                      background: '#ffffff',
                      border: '1px solid rgba(5,150,105,0.18)',
                      borderRadius: 12, overflow: 'hidden',
                      boxShadow: '0 8px 40px rgba(0,0,0,0.09)',
                      zIndex: 100
                    }}>
                      {suggestions.map((s, i) => (
                        <div
                          key={s.id}
                          onMouseDown={() => selectSuggestion(s)}
                          onMouseEnter={() => setActiveIdx(i)}
                          style={{
                            display: 'flex', alignItems: 'center', gap: 10,
                            padding: '10px 16px', cursor: 'pointer',
                            background: i === activeIdx ? 'rgba(5,150,105,0.15)' : 'transparent',
                            borderBottom: i < suggestions.length - 1 ? '1px solid rgba(64,145,108,0.12)' : 'none',
                            transition: 'background 0.1s'
                          }}
                        >
                          <span style={{ fontSize: 15, flexShrink: 0 }}>📍</span>
                          <div style={{ display:'flex', flexDirection:'column', gap: 1, minWidth: 0 }}>
                            <span style={{ color: '#0f2d1e', fontSize: 14, fontWeight: 600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                              {s.city}
                              {s.state && <span style={{ color: 'rgba(15,45,30,0.80)', fontWeight: 500 }}>, {s.state}</span>}
                            </span>
                            {s.sub && (
                              <span style={{ color: 'rgba(15,45,30,0.62)', fontSize: 11 }}>{s.sub}</span>
                            )}
                          </div>
                          <span style={{ marginLeft:'auto', color:'rgba(15,45,30,0.62)', fontSize: 11, flexShrink:0 }}>USA</span>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* No US results notice */}
                  {showDrop && !sugLoading && query.trim().length >= 2 && suggestions.length === 0 && (
                    <div style={{
                      position: 'absolute', top: 'calc(100% + 6px)', left: 0, right: 0,
                      background: '#ffffff',
                      border: '1px solid rgba(5,150,105,0.16)',
                      borderRadius: 12, padding: '12px 16px', zIndex: 100,
                      boxShadow: '0 8px 32px rgba(0,0,0,0.08)'
                    }}>
                      <span style={{ color:'rgba(15,45,30,0.80)', fontSize: 13 }}>
                        No US locations found for "<strong style={{color:'rgba(15,45,30,0.7)'}}>{query}</strong>"
                      </span>
                    </div>
                  )}
                </div>

                <button
                  onClick={handleGeo} disabled={loading}
                  style={{
                    background: '#f0fdf9',
                    border: '1px solid rgba(5,150,105,0.20)',
                    borderRadius: 12, padding: '10px 16px', color: 'rgba(15,45,30,0.85)',
                    fontSize: 13, cursor: loading ? 'not-allowed' : 'pointer',
                    opacity: loading ? 0.5 : 1, fontFamily: 'inherit',
                    transition: 'border-color 0.15s, background 0.15s', whiteSpace:'nowrap',
                    boxShadow: 'inset 0 1px 0 rgba(5,150,105,0.13)'
                  }}
                  onMouseEnter={e => { e.target.style.borderColor = 'rgba(5,150,105,0.5)'; e.target.style.background = 'rgba(5,150,105,0.12)'; }}
                  onMouseLeave={e => { e.target.style.borderColor = 'rgba(5,150,105,0.20)'; e.target.style.background = 'rgba(5,150,105,0.06)'; }}
                >
                  📍 Use My Location
                </button>
                {weather && (
                  <button onClick={saveLocation}
                    style={{ background:'#f0fdf9', border:'1px solid rgba(5,150,105,0.20)', borderRadius:12, padding:'10px 14px', color:'rgba(15,45,30,0.88)', fontSize:13, cursor:'pointer', fontFamily:'inherit', whiteSpace:'nowrap' }}
                    title="Save this location for quick access">
                    ☆ Save
                  </button>
                )}
              </div>
              {error && <p style={{ margin:'10px 0 0', color: '#f87171', fontSize: 13 }}>{error}</p>}
            </div>
          </div>

          {/* ── Step 2: Crop Selector (always visible after page load) ── */}
          <div style={{ maxWidth: 900, margin: '16px auto 0', padding: '0 24px' }}>
            <div className="frost" style={{ background:'#f0fdf9', borderRadius: 16, padding: '16px 20px', border: '1px solid rgba(5,150,105,0.14)', boxShadow:'0 4px 24px rgba(0,0,0,0.06)', display:'flex', alignItems:'center', gap: 16, flexWrap:'wrap' }}>
              <div style={{ display:'flex', alignItems:'center', gap: 8, flexShrink: 0 }}>
                <span style={{ fontSize: 22 }}>🌾</span>
                <div>
                  <p style={{ margin: 0, color:'rgba(5,150,105,0.7)', fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform:'uppercase' }}>Step 2</p>
                  <p style={{ margin: 0, color:'rgba(15,45,30,0.9)', fontSize: 13, fontWeight: 700 }}>Select Your Crop</p>
                </div>
              </div>
              <select value={selectedCrop} onChange={e => setSelectedCrop(e.target.value)}
                style={{ flex: 1, minWidth: 180, background:'#f0fdf9', border:'1px solid rgba(5,150,105,0.25)', borderRadius: 10, padding:'10px 14px', color:'#0f2d1e', fontSize: 14, fontFamily:'inherit', outline:'none', cursor:'pointer', WebkitAppearance:'none', appearance:'none' }}>
                {CROPS.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
              </select>
              {selectedCrop !== 'all' && (
                <div style={{ display:'flex', alignItems:'center', gap: 6, background:'rgba(34,197,94,0.08)', border:'1px solid rgba(34,197,94,0.25)', borderRadius: 8, padding:'6px 12px' }}>
                  <span style={{ color:'#059669', fontSize: 12 }}>✓</span>
                  <span style={{ color:'rgba(15,45,30,0.88)', fontSize: 12 }}>Herbicide search will show <strong style={{color:'#059669'}}>{(CROPS.find(c=>c.id===selectedCrop)||{}).label}</strong>-labeled products only</span>
                </div>
              )}
            </div>
          </div>

          {/* ── Loading spinner ── */}
          {loading && !weather && (
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding: '80px 0', gap: 16 }}>
              <div style={{
                width: 44, height: 44, border: '4px solid rgba(5,150,105,0.2)',
                borderTopColor: '#059669', borderRadius: '50%',
                animation: 'spin 0.8s linear infinite'
              }} />
              <p style={{ color: 'rgba(15,45,30,0.82)', fontSize: 14 }}>Fetching weather data…</p>
              <style>{`@keyframes spin { to { transform: rotate(360deg) } }`}</style>
            </div>
          )}

          {/* ── Empty state ── */}
          {!weather && !loading && (
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding: '64px 24px', textAlign:'center' }}>
              <span style={{ fontSize: 64, marginBottom: 16 }}>🌾</span>
              <h2 style={{ margin:'0 0 8px', fontSize: 20, fontWeight: 800, color: '#0f2d1e' }}>
                Enter a location to get started
              </h2>
              <p style={{ margin: 0, color: 'rgba(15,45,30,0.80)', fontSize: 14, maxWidth: 360, lineHeight: 1.6 }}>
                Search your farm location to see current spray conditions, a live Go/No-Go verdict, and the best 24-hour spray windows.
              </p>
              <div style={{ display:'flex', gap: 24, marginTop: 32, flexWrap:'wrap', justifyContent:'center' }}>
                {[
                  ['🌱', '3–10 mph', 'Ideal spray conditions'],
                  ['💨', '10–15 mph', 'Caution — drift risk'],
                  ['⛔', '>15 mph / rain', 'Do not spray'],
                ].map(([icon, wind, desc]) => (
                  <div key={wind} className="frost-light" style={{ background:'#f0fdf9', borderRadius: 14, padding: '16px 20px', border:'1px solid rgba(5,150,105,0.13)', minWidth: 140, textAlign:'center' }}>
                    <div style={{ fontSize: 28, marginBottom: 6 }}>{icon}</div>
                    <div style={{ fontWeight: 700, color: 'rgba(15,45,30,0.7)', fontSize: 13 }}>{wind}</div>
                    <div style={{ color: 'rgba(15,45,30,0.84)', fontSize: 12, marginTop: 2 }}>{desc}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ── Main Dashboard ── */}
          {weather && (
            <div style={{ maxWidth: 900, margin: '24px auto 0', padding: '0 24px 64px', display:'flex', flexDirection:'column', gap: 24 }}>

              {/* Status panel */}
              <div className="frost" style={{ background:'#f0fdf9', borderRadius: 20, padding: 28, border:`1px solid rgba(5,150,105,0.18)`, boxShadow:`0 0 40px ${sc.ring}18, 0 4px 32px rgba(0,0,0,0.07), ` }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', flexWrap:'wrap', gap: 20 }}>
                  <div>
                    <p style={{ margin:'0 0 4px', color:'rgba(15,45,30,0.82)', fontSize: 11, fontWeight: 700, letterSpacing: 2, textTransform:'uppercase' }}>
                      Location
                    </p>
                    <h2 style={{ margin:'0 0 4px', fontSize: 22, fontWeight: 800, color:'#0f2d1e' }}>
                      {locName}
                    </h2>
                    <p style={{ margin:0, color:'rgba(15,45,30,0.62)', fontSize: 12 }}>{fmtDateTime()}</p>
                  </div>
                  <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap: 10 }}>
                    <StatusOrb status={status} />
                    <button onClick={printRecord} style={{ background:'#ecfdf5', border:'1px solid rgba(5,150,105,0.20)', borderRadius:10, padding:'6px 14px', color:'rgba(15,45,30,0.8)', fontSize:12, cursor:'pointer', fontFamily:'inherit' }}>
                      🖨 Print Record
                    </button>
                  </div>
                </div>

                {/* Rules legend */}
                <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap: 10, marginTop: 20 }}>
                  {[
                    { color:'#4ade80', bg:'rgba(34,197,94,0.08)', border:'rgba(34,197,94,0.28)', label:'● GO', rule:'3–10 mph wind · No rain 4 hrs' },
                    { color:'#fbbf24', bg:'rgba(251,191,36,0.08)', border:'rgba(251,191,36,0.28)', label:'● CAUTION', rule:'10–15 mph · Drift risk' },
                    { color:'#f87171', bg:'rgba(239,68,68,0.08)', border:'rgba(248,113,113,0.28)', label:'● NO-GO', rule:'>15 mph or rain in 2 hrs' },
                  ].map(r => (
                    <div key={r.label} className="frost-light" style={{ background: r.bg, border:`1px solid ${r.border}`, borderRadius: 10, padding: '10px 12px', textAlign:'center' }}>
                      <div style={{ color: r.color, fontWeight: 700, fontSize: 12, marginBottom: 3 }}>{r.label}</div>
                      <div style={{ color:'rgba(15,45,30,0.80)', fontSize: 11, lineHeight: 1.4 }}>{r.rule}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Current conditions */}
              <div>
                <p style={{ margin:'0 0 12px', color:'rgba(15,45,30,0.82)', fontSize: 11, fontWeight: 700, letterSpacing: 2, textTransform:'uppercase' }}>
                  Current Conditions
                </p>
                <div className="metric-grid" style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap: 12 }}>
                  <MetricCard icon="💨" label="Wind Speed"  value={Math.round(curWind)}          unit="mph" />
                  <MetricCard icon="🧭" label="Direction"   value={degToCompass(curDir)}          unit={`${Math.round(curDir)}°`} />
                  <MetricCard icon="🌡️" label="Temperature" value={Math.round(curTemp)}           unit="°F" />
                  <MetricCard icon="🌧️" label="Rain Chance" value={curRain}                       unit="%" />
                  <MetricCard icon="💧" label="Humidity"    value={curRH ?? '—'}                  unit={curRH !== null ? '%' : ''} />
                  <MetricCard icon="☁️" label="Cloud Cover" value={curCloud ?? '—'}               unit={curCloud !== null ? '%' : ''} />
                </div>
              </div>

              {/* ── Temperature Inversion Risk Banner ── */}
              {inversionRisk && (
                <div style={{ background: inversionHigh ? 'rgba(239,68,68,0.1)' : 'rgba(251,191,36,0.09)', border: `1px solid ${inversionHigh ? 'rgba(239,68,68,0.45)' : 'rgba(251,191,36,0.4)'}`, borderRadius: 14, padding: '14px 18px', display:'flex', gap: 14, alignItems:'flex-start' }}>
                  <span style={{ fontSize: 22, flexShrink: 0 }}>{inversionHigh ? '🚫' : '⚠️'}</span>
                  <div>
                    <p style={{ margin:'0 0 4px', color: inversionHigh ? '#f87171' : '#fbbf24', fontSize: 14, fontWeight: 800 }}>
                      {inversionHigh ? 'HIGH INVERSION RISK — Do Not Apply' : 'Temperature Inversion Risk — Spray with Caution'}
                    </p>
                    <p style={{ margin:0, color:'rgba(15,45,30,0.80)', fontSize: 12, lineHeight: 1.6 }}>
                      Wind is below 3 mph{inversionHigh ? ' and humidity is above 90%' : ''}. Calm conditions can trap pesticide vapor in a shallow layer near the ground, allowing it to travel long distances off-target before dispersing. {inversionHigh ? 'Do not apply pesticides until wind reaches 3–5 mph with a consistent direction.' : 'Apply only if wind increases above 3 mph. Watch for smoke or fog drifting horizontally without rising — a key inversion indicator.'}
                    </p>
                  </div>
                </div>
              )}

              {/* ── Herbicide Selector ── */}
              <div className="frost" style={{ background:'#f0fdf9', border:'1px solid rgba(5,150,105,0.14)', borderRadius:20, padding:24, boxShadow:'0 4px 32px rgba(0,0,0,0.22)' }}>
                <HerbicideSelector
                  selected={selectedHerbs}
                  onAdd={h => setSelectedHerbs(prev => prev.find(p => p.id===h.id) ? prev : [...prev, h])}
                  onRemove={id => setSelectedHerbs(prev => prev.filter(h => h.id !== id))}
                  weather={weather}
                  curTemp={curTemp}
                  curWind={curWind}
                  rain2h={curRain2h}
                  selectedCrop={selectedCrop}
                  setSelectedCrop={setSelectedCrop}
                />
              </div>

              {/* ── Tank-mix panels (compatibility, adjuvant, resistance, rate calc) ── */}
              {selectedHerbs.length > 0 && (
                <div className="frost" style={{ background:'#f0fdf9', border:'1px solid rgba(5,150,105,0.14)', borderRadius:20, padding:24, boxShadow:'0 4px 32px rgba(0,0,0,0.22)', display:'flex', flexDirection:'column', gap: 24 }}>
                  <CompatibilityPanel herbs={selectedHerbs} />
                  <AdjuvantPanel herbs={selectedHerbs} />
                  <ResistancePanel herbs={selectedHerbs} />
                  <details>
                    <summary style={{ color:'rgba(15,45,30,0.80)', fontSize:12, fontWeight:700, letterSpacing:1.5, textTransform:'uppercase', cursor:'pointer', userSelect:'none', padding:'6px 0', listStyle:'none' }}>
                      🧮 Rate Calculator {showRateCalc ? '▲' : '▼'}
                    </summary>
                    <div style={{ marginTop: 12 }}>
                      <RateCalculator herbs={selectedHerbs} fieldAcres={fieldAcres} setFieldAcres={setFieldAcres} targetGPA={15} />
                    </div>
                  </details>
                </div>
              )}

              {/* Spray guidance */}
              <div className="frost" style={{
                background: `rgba(${status==='green'?'34,197,94':status==='yellow'?'251,191,36':'239,68,68'},0.07)`,
                border: `1px solid ${sc.ring}40`,
                borderRadius: 18, padding: 24,
                boxShadow: `0 0 32px ${sc.ring}14, 0 4px 24px rgba(0,0,0,0.22)`
              }}>
                <p style={{ margin:'0 0 10px', color:'rgba(15,45,30,0.82)', fontSize: 11, fontWeight: 700, letterSpacing: 2, textTransform:'uppercase' }}>
                  Spray Guidance
                </p>
                <p style={{ margin:'0 0 12px', color: sc.dot, fontWeight: 700, fontSize: 17, lineHeight: 1.4 }}>
                  {ADVICE[status].headline}
                </p>
                <ul style={{ margin: 0, paddingLeft: 20, display:'flex', flexDirection:'column', gap: 6 }}>
                  {ADVICE[status].points.map((pt, i) => (
                    <li key={i} style={{ color:'rgba(15,45,30,0.8)', fontSize: 14, lineHeight: 1.5 }}>{pt}</li>
                  ))}
                </ul>
              </div>

              {/* Nozzle & application recommendations (GO + CAUTION only) */}
              {(status === 'green' || status === 'yellow') && (
                <SprayRecommendations windSpeed={curWind} status={status} selectedHerbs={selectedHerbs} />
              )}

              {/* Nozzle calibration calculator */}
              {(status === 'green' || status === 'yellow') && (
                <div className="frost" style={{ background:'#f0fdf9', border:'1px solid rgba(5,150,105,0.14)', borderRadius:20, padding:24, boxShadow:'0 4px 32px rgba(0,0,0,0.22)' }}>
                  <details>
                    <summary style={{ color:'rgba(15,45,30,0.80)', fontSize:12, fontWeight:700, letterSpacing:1.5, textTransform:'uppercase', cursor:'pointer', userSelect:'none', listStyle:'none', display:'flex', alignItems:'center', gap:8 }}>
                      <span>⚙️ Nozzle Calibration Calculator</span>
                      <span style={{ color:'rgba(15,45,30,0.72)', fontSize:10 }}>click to expand</span>
                    </summary>
                    <div style={{ marginTop: 16 }}>
                      <NozzleCalculator recommendedGPA={15} fieldAcres={fieldAcres} />
                    </div>
                  </details>
                </div>
              )}

              {/* Best spray windows */}
              <div>
                <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:14 }}>
                  <p style={{ margin:0, color:'rgba(15,45,30,0.82)', fontSize:11, fontWeight:700, letterSpacing:2, textTransform:'uppercase' }}>
                    Best Spray Windows — Next 24 Hours
                  </p>
                  <span style={{
                    background: greenBlocks.length > 0 ? '#dcfce7' : '#fee2e2',
                    color: greenBlocks.length > 0 ? '#15803d' : '#dc2626',
                    fontSize:10, fontWeight:800, padding:'2px 10px', borderRadius:20, whiteSpace:'nowrap'
                  }}>
                    {greenBlocks.length > 0 ? `${greenBlocks.length} window${greenBlocks.length > 1 ? 's' : ''} found` : 'None found'}
                  </span>
                </div>
                {greenBlocks.length > 0 ? (
                  <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                    {greenBlocks.map((b, i) => {
                      const winds = b.hours.map(h => h.wind);
                      const windMin = Math.round(Math.min(...winds));
                      const windMax = Math.round(Math.max(...winds));
                      const maxRain = Math.max(...b.hours.map(h => h.rain));
                      const dur = b.hours.length;
                      const startLabel = b.start.isNow ? 'NOW' : fmtHour(b.start.time);
                      const endLabel = fmtHour(b.end.time);
                      const allDirs = b.hours.map(h => degToCompass(h.dir));
                      const dominantDir = allDirs.sort((a,z) =>
                        allDirs.filter(v=>v===z).length - allDirs.filter(v=>v===a).length
                      )[0];
                      return (
                        <div key={i} style={{ background:'#f0fdf4', border:'1.5px solid rgba(22,163,74,0.28)', borderRadius:14, padding:'14px 18px', display:'flex', alignItems:'center', gap:14, flexWrap:'wrap', boxShadow:'0 1px 4px rgba(0,0,0,0.05)' }}>
                          <div style={{ width:44, height:44, borderRadius:10, background:'#dcfce7', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, fontSize:22 }}>
                            ✅
                          </div>
                          <div style={{ flex:1, minWidth:130 }}>
                            <p style={{ margin:'0 0 4px', fontSize:17, fontWeight:800, color:'#15803d', letterSpacing:-0.3 }}>
                              {startLabel} — {endLabel}
                            </p>
                            <p style={{ margin:0, fontSize:12, color:'rgba(15,45,30,0.82)' }}>
                              {windMin === windMax ? `${windMin} mph` : `${windMin}–${windMax} mph`} &nbsp;·&nbsp; {dominantDir} &nbsp;·&nbsp; 🌧 {maxRain}%
                            </p>
                          </div>
                          <span style={{ background:'#bbf7d0', color:'#166534', fontSize:13, fontWeight:800, padding:'6px 16px', borderRadius:20, whiteSpace:'nowrap', flexShrink:0 }}>
                            {dur}h window
                          </span>
                        </div>
                      );
                    })}
                  </div>
                ) : (
                  <div style={{ background:'#fff1f2', border:'1px solid rgba(239,68,68,0.25)', borderRadius:14, padding:'18px 20px', display:'flex', gap:14, alignItems:'center' }}>
                    <span style={{ fontSize:28, flexShrink:0 }}>🚫</span>
                    <div>
                      <p style={{ margin:'0 0 4px', color:'#dc2626', fontWeight:800, fontSize:15 }}>No ideal spray windows in the next 24 hours.</p>
                      <p style={{ margin:0, color:'rgba(15,45,30,0.82)', fontSize:13 }}>Monitor the hourly forecast below and check back later.</p>
                    </div>
                  </div>
                )}
              </div>

              {/* 24-hour forecast chart + scroll cards */}
              <div>
                <p style={{ margin:'0 0 14px', color:'rgba(15,45,30,0.82)', fontSize: 11, fontWeight: 700, letterSpacing: 2, textTransform:'uppercase' }}>
                  24-Hour Spray Forecast
                </p>

                {/* ── Timeline color bar ── */}
                <div style={{ background:'#ffffff', border:'1px solid rgba(5,150,105,0.15)', borderRadius:14, padding:'16px 16px 12px', marginBottom:12, boxShadow:'0 1px 4px rgba(0,0,0,0.05)' }}>
                  <p style={{ margin:'0 0 10px', fontSize:11, fontWeight:700, color:'rgba(15,45,30,0.72)', letterSpacing:1 }}>AT A GLANCE</p>
                  {/* Colored segments */}
                  <div style={{ display:'flex', borderRadius:8, overflow:'hidden', height:28, marginBottom:6 }}>
                    {hourly.slice(0,24).map((h, i) => {
                      const st = sprayStatus(h.wind, h.rain, h.rain);
                      const bg = st==='green' ? '#16a34a' : st==='yellow' ? '#d97706' : '#ef4444';
                      return <div key={i} style={{ flex:1, background:bg }} title={`${h.isNow?'NOW':fmtHour(h.time)}: ${Math.round(h.wind)}mph · ${h.rain}% rain`} />;
                    })}
                  </div>
                  {/* Time labels */}
                  <div style={{ display:'flex', paddingRight:0 }}>
                    {hourly.slice(0,24).map((h, i) => (
                      i % 6 === 0
                        ? <span key={i} style={{ flex:6, fontSize:10, color:'rgba(15,45,30,0.62)', textAlign: i===0?'left':'center' }}>{h.isNow ? 'NOW' : fmtHour(h.time)}</span>
                        : (i < 24-1 && i % 6 !== 0) ? null : null
                    ))}
                    <span style={{ fontSize:10, color:'rgba(15,45,30,0.62)', textAlign:'right', minWidth:32 }}>{hourly[23] ? fmtHour(hourly[23].time) : ''}</span>
                  </div>
                  {/* Legend */}
                  <div style={{ display:'flex', gap:14, marginTop:10, flexWrap:'wrap' }}>
                    {[['#16a34a','Go — safe to spray'],['#d97706','Caution — marginal'],['#ef4444','No-Go — do not spray']].map(([c,l]) => (
                      <div key={l} style={{ display:'flex', alignItems:'center', gap:5 }}>
                        <div style={{ width:12, height:12, borderRadius:3, background:c, flexShrink:0 }} />
                        <span style={{ fontSize:11, color:'rgba(15,45,30,0.80)' }}>{l}</span>
                      </div>
                    ))}
                  </div>
                </div>

                {/* SVG wind + temp chart */}
                <div style={{ padding: '14px 16px 8px', borderRadius: 14, background:'#ffffff', border:'1px solid rgba(5,150,105,0.15)', marginBottom: 12, boxShadow:'0 1px 4px rgba(0,0,0,0.05)' }}>
                  <ForecastChart hourly={hourly} />
                </div>

                {/* Hourly card scroll */}
                <div style={{ overflowX: 'auto', borderRadius: 14, background:'#ffffff', border:'1px solid rgba(5,150,105,0.15)', padding: 14, boxShadow:'0 1px 4px rgba(0,0,0,0.05)' }}>
                  <div style={{ display:'flex', gap: 8, minWidth: 'max-content' }}>
                    {hourly.map((h, i) => (
                      <HourCell key={i} time={h.time} wind={h.wind} dir={h.dir} rain={h.rain} isNow={h.isNow} />
                    ))}
                  </div>
                  <p style={{ margin:'10px 0 0', textAlign:'center', color:'rgba(15,45,30,0.62)', fontSize:11 }}>
                    Scroll → &nbsp;|&nbsp; Wind in mph &nbsp;|&nbsp; 🌧 rain probability
                  </p>
                </div>
              </div>

              {/* Footer */}
              <p style={{ textAlign:'center', color:'rgba(15,45,30,0.62)', fontSize: 11, lineHeight: 1.6 }}>
                Weather data via <strong style={{ color:'rgba(5,150,105,0.5)' }}>Open-Meteo</strong> (open-source, no API key required) &nbsp;·&nbsp;
                Always follow pesticide label instructions &nbsp;·&nbsp; Consult your agronomist for crop-specific guidance
              </p>
            </div>
          )}
          </div>{/* /content zIndex wrapper */}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
